apiVersion: apps/v1
kind: Deployment

metadata:
  name: backend
  namespace: myapp

spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: api
        image: nefor32/myapp:f2815749b34f3d532c4c9515270bb9e812817a13
        ports:
        - containerPort: 4200